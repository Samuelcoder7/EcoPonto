<!-- =====================================================================================
  PÁGINA PAINEL - TEMPLATE DE NAVEGAÇÃO DO USUÁRIO
  =====================================================================================
  Reúne ações principais do perfil, atalhos para fluxo diário e saída da sessão.
  ===================================================================================== -->

<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button fill="clear" routerLink="/home" routerDirection="back">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </ion-button>
      <ion-button class="icon-chip" fill="clear">
        <ion-icon name="grid-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Painel</ion-title>
    <ion-buttons slot="end">
      <ion-button class="icon-chip" fill="clear">
        <ion-icon name="person-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="page-content painel-page">
  <section class="perfil-hero">
    <div class="perfil-title">
      <h1>Meu Perfil</h1>
      <p>Acompanhe seu impacto ambiental</p>
    </div>
    <div class="perfil-stats">
      <div class="perfil-stat">
        <span class="stat-value">156.5 kg</span>
        <span class="stat-label">Total reciclado</span>
      </div>
      <div class="perfil-stat">
        <span class="stat-value">28</span>
        <span class="stat-label">Visitas aos ecopontos</span>
      </div>
    </div>
  </section>

  <section class="painel-body">
    <div class="impact-grid">
      <div class="impact-card">
        <ion-icon name="leaf-outline"></ion-icon>
        <h3>234.8 kg</h3>
        <p>CO₂ economizado</p>
      </div>
      <div class="impact-card">
        <ion-icon name="ribbon-outline"></ion-icon>
        <h3>12</h3>
        <p>Árvores equivalentes</p>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-head">
        <h2>Reciclagem mensal</h2>
        <ion-icon name="trending-up-outline"></ion-icon>
      </div>
      <div class="chart-bars">
        <div class="bar" style="--h: 46%"><span>Set</span></div>
        <div class="bar" style="--h: 62%"><span>Out</span></div>
        <div class="bar" style="--h: 70%"><span>Nov</span></div>
        <div class="bar" style="--h: 54%"><span>Dez</span></div>
        <div class="bar" style="--h: 78%"><span>Jan</span></div>
        <div class="bar" style="--h: 84%"><span>Fev</span></div>
        <div class="bar" style="--h: 40%"><span>Mar</span></div>
      </div>
    </div>

    <div class="panel-actions">
      <ion-button expand="block" (click)="irParaColeta()">
        <ion-icon name="map-outline" slot="start"></ion-icon>
        Ver pontos de coleta
      </ion-button>
      <ion-button expand="block" fill="outline" (click)="irParaSobre()">
        <ion-icon name="information-circle-outline" slot="start"></ion-icon>
        Sobre nós
      </ion-button>
      <ion-button expand="block" fill="outline" color="dark" (click)="irParaRanking()">
        <ion-icon name="trophy-outline" slot="start"></ion-icon>
        Ranking
      </ion-button>
      <ion-button expand="block" fill="clear" color="dark" (click)="sair()">
        Sair
      </ion-button>
    </div>
  </section>
</ion-content>
