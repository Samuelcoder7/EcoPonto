<!-- =====================================================================================
  PÁGINA LOGIN - TEMPLATE DE AUTENTICAÇÃO
  =====================================================================================
  Formulário de login com validação visual, feedback por alerta e navegação para cadastro.
  ===================================================================================== -->

<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button *ngIf="usuarioLogado" fill="clear" routerLink="/home" routerDirection="back">
        <ion-icon name="arrow-back-outline" color="light"></ion-icon>
      </ion-button>
      <ion-button class="icon-chip" fill="clear">
        <ion-icon name="log-in-outline"></ion-icon>
      </ion-button>
    </ion-buttons>

    <ion-title>
      Login
    </ion-title>
    
    <ion-buttons slot="end">
      <ion-button class="icon-chip" fill="clear">
        <ion-icon name="person-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="page-content auth-page">
  <section class="auth-hero">
    <div class="hero-content">
      <ion-icon name="log-in-outline" class="hero-icon"></ion-icon>
      <h1>Bem-vindo</h1>
      <p>Entre para continuar e acompanhar seu impacto.</p>
    </div>
  </section>

  <section class="auth-body">
    <ion-card class="auth-card" *ngIf="!carregando">
      <ion-card-header>
        <ion-card-title>Entrar</ion-card-title>
        <ion-card-subtitle>Use seu e-mail e senha para continuar.</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <form (ngSubmit)="fazerLogin()" #loginForm="ngForm">
          <ion-list class="form-list">
            <ion-item class="form-item" lines="none">
              <ion-label position="stacked">E-mail</ion-label>
              <ion-input 
                type="email" 
                [(ngModel)]="email" 
                name="email" 
                required
                #emailInput="ngModel">
              </ion-input>
              <ion-note *ngIf="emailInput.invalid && emailInput.touched" color="danger">
                E-mail válido é obrigatório
              </ion-note>
            </ion-item>

            <ion-item class="form-item" lines="none">
              <ion-label position="stacked">Senha</ion-label>
              <ion-input 
                type="password" 
                [(ngModel)]="senha" 
                name="senha" 
                required
                #senhaInput="ngModel">
              </ion-input>
              <ion-note *ngIf="senhaInput.invalid && senhaInput.touched" color="danger">
                Senha é obrigatória
              </ion-note>
            </ion-item>
          </ion-list>

          <ion-text class="helper-text muted-text">
            <p>Caso não tenha conta, crie uma em segundos.</p>
          </ion-text>

          <div class="auth-actions">
            <ion-button 
              type="submit" 
              expand="block" 
              color="primary" 
              routerDirection="forward"
              [disabled]="loginForm.invalid || processando"
              class="submit-button">
              <ion-icon *ngIf="processando" name="refresh-outline" class="spinning"></ion-icon>
              <span *ngIf="!processando">Entrar</span>
              <span *ngIf="processando">Entrando...</span>
            </ion-button>

            <ion-button 
              expand="block" 
              fill="outline" 
              color="medium" 
              type="button"
              (click)="irParaCadastro()"
              class="link-button">
              Criar conta
            </ion-button>
          </div>
        </form>
      </ion-card-content>
    </ion-card>

    <!-- Skeleton Loading -->
    <ion-card class="auth-card skeleton-card" *ngIf="carregando">
      <ion-card-header>
        <ion-skeleton-text animated style="width: 40%; height: 28px;"></ion-skeleton-text>
        <ion-skeleton-text animated style="width: 70%; height: 20px; margin-top: 8px;"></ion-skeleton-text>
      </ion-card-header>

      <ion-card-content>
        <div class="form-list">
          <div class="skeleton-field" *ngFor="let i of [1,2]">
            <ion-skeleton-text animated style="width: 30%; height: 16px; margin-bottom: 8px;"></ion-skeleton-text>
            <ion-skeleton-text animated style="width: 100%; height: 48px; border-radius: 12px;"></ion-skeleton-text>
          </div>
        </div>

        <div class="helper-text">
          <ion-skeleton-text animated style="width: 80%; height: 16px;"></ion-skeleton-text>
        </div>

        <div class="auth-actions" style="margin-top: 32px;">
          <ion-skeleton-text animated style="width: 100%; height: 52px; border-radius: 14px;"></ion-skeleton-text>
          <ion-skeleton-text animated style="width: 100%; height: 52px; border-radius: 14px; margin-top: 12px;"></ion-skeleton-text>
        </div>
      </ion-card-content>
    </ion-card>
  </section>

  <ion-alert
    [isOpen]="mostrarAlerta"
    [header]="tipoAlerta === 'success' ? 'Sucesso!' : 'Atenção!'"
    [message]="mensagemAlerta"
    [buttons]="alertButtons"
    (didDismiss)="fecharAlerta()">
  </ion-alert>

  <!-- botão flutuante para limpar o formulário -->
  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="limparFormulario()">
      <ion-icon name="trash"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
